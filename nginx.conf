worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Rate Limiting ────────────────────────────────────────────────────────
    # 30 requests/second per IP with a burst of 60, then queue up to 200
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Upstream: Next.js cluster ─────────────────────────────────────────────
    upstream nextjs_cluster {
        # Docker DNS resolves 'web' to all replicas automatically
        server web:3000;
        keepalive 32;
    }

    # ── Upstream: Terminal WebSocket server ───────────────────────────────────
    upstream terminal_server {
        server terminal:4000;
        keepalive 16;
    }

    # ── Proxy Cache ───────────────────────────────────────────────────────────
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=static_cache:10m
                     max_size=100m inactive=60m use_temp_path=off;

    server {
        listen 80;

        # ── Static assets — long-lived cache ─────────────────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs_cluster;
            proxy_cache static_cache;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400, immutable";
            proxy_set_header Host $host;
        }

        # ── WebSocket Terminal — upgrade handling ─────────────────────────────
        location /api/terminal/ {
            limit_req zone=ws_limit burst=10 nodelay;

            proxy_pass http://terminal_server/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep WebSocket alive for long lab sessions
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── All other traffic ─────────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass http://nextjs_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
